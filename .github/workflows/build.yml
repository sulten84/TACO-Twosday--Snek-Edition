name: Build Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r taco/requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller taco.spec

      - name: Create archive
        run: Compress-Archive -Path dist/TACO_Twosday -DestinationPath TACO_Twosday_Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: TACO_Twosday_Windows
          path: TACO_Twosday_Windows.zip

  build-debian:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1-mesa-dev libglib2.0-0 libfontconfig1 libxkbcommon0 libdbus-1-3

      - name: Install Python dependencies
        run: |
          pip install -r taco/requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller taco.spec

      - name: Create tarball
        run: tar -czf TACO_Twosday_Debian.tar.gz -C dist TACO_Twosday

      - uses: actions/upload-artifact@v4
        with:
          name: TACO_Twosday_Debian
          path: TACO_Twosday_Debian.tar.gz

  build-archlinux:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Initialize keyring and install packages
        run: |
          pacman-key --init
          pacman -Syu --noconfirm
          pacman -S --noconfirm git python python-pip python-pyqt6 python-opengl python-numpy binutils

      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip install --break-system-packages pyrr pyinstaller PyOpenGL-accelerate

      - name: Build with PyInstaller
        run: pyinstaller taco.spec

      - name: Create tarball
        run: tar -czf TACO_Twosday_Archlinux.tar.gz -C dist TACO_Twosday

      - uses: actions/upload-artifact@v4
        with:
          name: TACO_Twosday_Archlinux
          path: TACO_Twosday_Archlinux.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r taco/requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller taco.spec

      - name: Create archive
        run: |
          cd dist
          zip -r ../TACO_Twosday_macOS.zip TACO_Twosday.app

      - uses: actions/upload-artifact@v4
        with:
          name: TACO_Twosday_macOS
          path: TACO_Twosday_macOS.zip

  release:
    needs: [build-windows, build-debian, build-archlinux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/TACO_Twosday_Windows/TACO_Twosday_Windows.zip
            artifacts/TACO_Twosday_Debian/TACO_Twosday_Debian.tar.gz
            artifacts/TACO_Twosday_Archlinux/TACO_Twosday_Archlinux.tar.gz
            artifacts/TACO_Twosday_macOS/TACO_Twosday_macOS.zip
          generate_release_notes: true
